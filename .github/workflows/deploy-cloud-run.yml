name: Deploy Cloud Run Job

on:
  workflow_dispatch:
    inputs:
      target_month:
        description: "Validation target month in YYYYMM format. Blank uses the previous month."
        required: false
        default: ""
        type: string
      run_validation:
        description: "Run normal and comparison-export executions after deployment"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main
      - fix/quality-check-samples

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run-job-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ice-qb
  GAR_LOCATION: asia-northeast1
  GAR_REPOSITORY: royalty-source
  IMAGE_NAME: royalty-source-job
  CLOUD_RUN_JOB: royalty-source-job
  CLOUD_RUN_REGION: asia-northeast1
  BQ_STAGING_DATASET: royalty_staging
  BQ_RAW_DATASET: royalty_raw
  BQ_SOURCE_DATASET: royalty_source
  BQ_AUDIT_DATASET: royalty_audit
  BQ_LOCATION: asia-northeast1
  DRIVE_SOURCE_FOLDER_ID: 1I9sBj6LYyaRPy1LcOWdQ3mDtJA-HDAQN
  DRIVE_OUTPUT_FOLDER_ID: 1zlmvNdJK3u8w0cQdBWCfZSxX7VpSTwzH

jobs:
  deploy:
    name: Build and deploy Cloud Run Job
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_DEPLOY_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - name: Resolve image URI
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URI="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Build image
        run: docker build --no-cache -t "${IMAGE_URI}" .

      - name: Push image
        run: docker push "${IMAGE_URI}"

      - name: Deploy Cloud Run Job
        shell: bash
        run: |
          set -euo pipefail
          ENV_VARS="GCP_PROJECT_ID=${GCP_PROJECT_ID},BQ_STAGING_DATASET=${BQ_STAGING_DATASET},BQ_RAW_DATASET=${BQ_RAW_DATASET},BQ_SOURCE_DATASET=${BQ_SOURCE_DATASET},BQ_AUDIT_DATASET=${BQ_AUDIT_DATASET},BQ_LOCATION=${BQ_LOCATION},DRIVE_SOURCE_FOLDER_ID=${DRIVE_SOURCE_FOLDER_ID},DRIVE_OUTPUT_FOLDER_ID=${DRIVE_OUTPUT_FOLDER_ID},LOG_LEVEL=INFO,FAIL_ON_QUALITY_ERRORS=true,EXPORT_OUTPUT_FILES=false,MAX_GENERIC_COLUMNS=40"

          gcloud run jobs deploy "${CLOUD_RUN_JOB}" \
            --image "${IMAGE_URI}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --service-account "${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}" \
            --set-env-vars "${ENV_VARS}" \
            --memory 2Gi \
            --cpu 1 \
            --task-timeout 3600 \
            --max-retries 0 \
            --quiet

      - name: Verify deployed job
        run: |
          set -euo pipefail
          DEPLOYED_IMAGE="$(gcloud run jobs describe "${CLOUD_RUN_JOB}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --format='value(spec.template.template.spec.containers[0].image)')"

          test "${DEPLOYED_IMAGE}" = "${IMAGE_URI}"
          echo "Deployed image: ${DEPLOYED_IMAGE}"

  validate:
    name: Execute post-deploy validation
    needs: deploy
    if: >-
      github.ref == 'refs/heads/fix/quality-check-samples' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_validation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_DEPLOY_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            google-api-python-client>=2.149.0 \
            google-auth>=2.35.0 \
            google-cloud-bigquery>=3.25.0 \
            openpyxl>=3.1.5

      - name: Resolve target month
        id: target
        shell: bash
        env:
          REQUESTED_TARGET_MONTH: ${{ github.event_name == 'workflow_dispatch' && inputs.target_month || '' }}
        run: |
          set -euo pipefail
          TARGET_MONTH="${REQUESTED_TARGET_MONTH}"
          if [ -z "${TARGET_MONTH}" ]; then
            TARGET_MONTH="$(TZ=Asia/Tokyo date -d '1 month ago' +%Y%m)"
          fi

          if [[ ! "${TARGET_MONTH}" =~ ^[0-9]{6}$ ]]; then
            echo "target_month must use YYYYMM format: ${TARGET_MONTH}" >&2
            exit 1
          fi

          MONTH="${TARGET_MONTH:4:2}"
          if (( 10#${MONTH} < 1 || 10#${MONTH} > 12 )); then
            echo "target_month contains an invalid month: ${TARGET_MONTH}" >&2
            exit 1
          fi

          echo "target_month=${TARGET_MONTH}" >> "${GITHUB_OUTPUT}"
          echo "Validation target month: ${TARGET_MONTH}"

      - name: Execute normal run without comparison export
        id: normal
        shell: bash
        run: |
          set -euo pipefail
          gcloud run jobs update "${CLOUD_RUN_JOB}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --update-env-vars "JOB_TARGET_MONTH=${{ steps.target.outputs.target_month }},FAIL_ON_QUALITY_ERRORS=true,EXPORT_OUTPUT_FILES=false" \
            --quiet

          EXECUTION_NAME="$(gcloud run jobs execute "${CLOUD_RUN_JOB}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --wait \
            --format='value(metadata.name)')"

          test -n "${EXECUTION_NAME}"
          echo "execution_name=${EXECUTION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "Normal execution: ${EXECUTION_NAME}"

      - name: Verify normal execution
        shell: bash
        run: |
          set -euo pipefail
          gcloud run jobs executions describe "${{ steps.normal.outputs.execution_name }}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --format="yaml(metadata.name,status.succeededCount,status.failedCount,status.conditions)"

      - name: Execute comparison workbook export
        id: comparison
        shell: bash
        run: |
          set -euo pipefail
          gcloud run jobs update "${CLOUD_RUN_JOB}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --update-env-vars "JOB_TARGET_MONTH=${{ steps.target.outputs.target_month }},FAIL_ON_QUALITY_ERRORS=true,EXPORT_OUTPUT_FILES=true" \
            --quiet

          EXECUTION_NAME="$(gcloud run jobs execute "${CLOUD_RUN_JOB}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --wait \
            --format='value(metadata.name)')"

          test -n "${EXECUTION_NAME}"
          echo "execution_name=${EXECUTION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "Comparison execution: ${EXECUTION_NAME}"

      - name: Verify comparison execution
        shell: bash
        run: |
          set -euo pipefail
          gcloud run jobs executions describe "${{ steps.comparison.outputs.execution_name }}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --format="yaml(metadata.name,status.succeededCount,status.failedCount,status.conditions)"

      - name: Download generated workbooks from Drive
        id: download
        shell: bash
        run: |
          set -euo pipefail
          TARGET_MONTH="${{ steps.target.outputs.target_month }}"
          mkdir -p "artifacts/${TARGET_MONTH}"

          python scripts/download_drive_file.py \
            --folder-id "${DRIVE_OUTPUT_FOLDER_ID}" \
            --name "comparison_access_input_${TARGET_MONTH}.xlsx" \
            --output "artifacts/${TARGET_MONTH}/comparison_access_input_${TARGET_MONTH}.xlsx"

          python scripts/download_drive_file.py \
            --folder-id "${DRIVE_OUTPUT_FOLDER_ID}" \
            --name "comparison_pod_input_${TARGET_MONTH}.xlsx" \
            --output "artifacts/${TARGET_MONTH}/comparison_pod_input_${TARGET_MONTH}.xlsx"

          echo "artifact_dir=artifacts/${TARGET_MONTH}" >> "${GITHUB_OUTPUT}"

      - name: Validate generated workbooks against BigQuery
        id: workbook_validation
        shell: bash
        run: |
          set -euo pipefail
          TARGET_MONTH="${{ steps.target.outputs.target_month }}"
          ARTIFACT_DIR="artifacts/${TARGET_MONTH}"

          set +e
          python scripts/validate_output_workbooks.py \
            --access "${ARTIFACT_DIR}/comparison_access_input_${TARGET_MONTH}.xlsx" \
            --pod "${ARTIFACT_DIR}/comparison_pod_input_${TARGET_MONTH}.xlsx" \
            --project-id "${GCP_PROJECT_ID}" \
            --dataset "${BQ_SOURCE_DATASET}" \
            --location "${BQ_LOCATION}" \
            --json-output "${ARTIFACT_DIR}/validation.json" \
            --markdown-output "${ARTIFACT_DIR}/validation.md"
          STATUS=$?
          set -e

          if [ -f "${ARTIFACT_DIR}/validation.md" ]; then
            cat "${ARTIFACT_DIR}/validation.md" >> "${GITHUB_STEP_SUMMARY}"
          fi

          echo "exit_code=${STATUS}" >> "${GITHUB_OUTPUT}"
          exit "${STATUS}"

      - name: Validate required values and duplicate keys
        id: constraint_validation
        if: always() && steps.download.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          TARGET_MONTH="${{ steps.target.outputs.target_month }}"
          ARTIFACT_DIR="artifacts/${TARGET_MONTH}"

          set +e
          python scripts/validate_output_constraints.py \
            --access "${ARTIFACT_DIR}/comparison_access_input_${TARGET_MONTH}.xlsx" \
            --pod "${ARTIFACT_DIR}/comparison_pod_input_${TARGET_MONTH}.xlsx" \
            --project-id "${GCP_PROJECT_ID}" \
            --dataset "${BQ_SOURCE_DATASET}" \
            --location "${BQ_LOCATION}" \
            --json-output "${ARTIFACT_DIR}/constraints_validation.json" \
            --markdown-output "${ARTIFACT_DIR}/constraints_validation.md"
          STATUS=$?
          set -e

          if [ -f "${ARTIFACT_DIR}/constraints_validation.md" ]; then
            cat "${ARTIFACT_DIR}/constraints_validation.md" >> "${GITHUB_STEP_SUMMARY}"
          fi

          echo "exit_code=${STATUS}" >> "${GITHUB_OUTPUT}"
          exit "${STATUS}"

      - name: Upload generated workbook artifacts
        if: always() && steps.download.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: generated-workbooks-${{ steps.target.outputs.target_month }}
          path: ${{ steps.download.outputs.artifact_dir }}
          if-no-files-found: error
          retention-days: 30

      - name: Restore safe default
        if: always()
        shell: bash
        run: |
          gcloud run jobs update "${CLOUD_RUN_JOB}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --update-env-vars "EXPORT_OUTPUT_FILES=false" \
            --quiet

      - name: Write validation summary
        if: always()
        shell: bash
        run: |
          NORMAL_EXECUTION="${{ steps.normal.outputs.execution_name }}"
          COMPARISON_EXECUTION="${{ steps.comparison.outputs.execution_name }}"
          NORMAL_URL="https://console.cloud.google.com/run/jobs/executions/details/${CLOUD_RUN_REGION}/${NORMAL_EXECUTION}/tasks?project=${GCP_PROJECT_ID}"
          COMPARISON_URL="https://console.cloud.google.com/run/jobs/executions/details/${CLOUD_RUN_REGION}/${COMPARISON_EXECUTION}/tasks?project=${GCP_PROJECT_ID}"

          {
            echo "## Cloud Run post-deploy validation"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Branch | \`${GITHUB_REF_NAME}\` |"
            echo "| Image | \`${{ needs.deploy.outputs.image_uri }}\` |"
            echo "| Target month | \`${{ steps.target.outputs.target_month }}\` |"
            echo "| Normal export flag | \`false\` |"
            echo "| Normal execution | \`${NORMAL_EXECUTION:-not started}\` |"
            echo "| Comparison export flag | \`true\` |"
            echo "| Comparison execution | \`${COMPARISON_EXECUTION:-not started}\` |"
            echo "| Workbook download | \`${{ steps.download.outcome }}\` |"
            echo "| Workbook/BigQuery validation | \`${{ steps.workbook_validation.outcome }}\` |"
            echo "| Required/duplicate validation | \`${{ steps.constraint_validation.outcome }}\` |"
            echo "| Artifact | \`generated-workbooks-${{ steps.target.outputs.target_month }}\` |"
            echo "| Restored default | \`EXPORT_OUTPUT_FILES=false\` |"
            if [ -n "${NORMAL_EXECUTION}" ]; then
              echo ""
              echo "[Open normal execution logs](${NORMAL_URL})"
            fi
            if [ -n "${COMPARISON_EXECUTION}" ]; then
              echo ""
              echo "[Open comparison execution logs](${COMPARISON_URL})"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
