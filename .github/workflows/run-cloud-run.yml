name: Run Cloud Run Job

on:
  workflow_dispatch:
    inputs:
      target_month:
        description: "Target accounting month in YYYYMM format"
        required: true
        type: string
      fail_on_quality_errors:
        description: "Fail the job when quality checks detect errors"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ice-qb
  CLOUD_RUN_JOB: royalty-source-job
  CLOUD_RUN_REGION: asia-northeast1

jobs:
  execute:
    name: Execute Cloud Run Job
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          TARGET_MONTH="${{ inputs.target_month }}"
          if [[ ! "${TARGET_MONTH}" =~ ^[0-9]{6}$ ]]; then
            echo "target_month must use YYYYMM format: ${TARGET_MONTH}" >&2
            exit 1
          fi

          MONTH="${TARGET_MONTH:4:2}"
          if (( 10#${MONTH} < 1 || 10#${MONTH} > 12 )); then
            echo "target_month contains an invalid month: ${TARGET_MONTH}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_DEPLOY_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify Cloud Run Job
        run: |
          set -euo pipefail
          gcloud run jobs describe "${CLOUD_RUN_JOB}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --format="table(metadata.name,spec.template.template.spec.containers[0].image)"

      - name: Update execution parameters
        run: |
          set -euo pipefail
          gcloud run jobs update "${CLOUD_RUN_JOB}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --update-env-vars "JOB_TARGET_MONTH=${{ inputs.target_month }},FAIL_ON_QUALITY_ERRORS=${{ inputs.fail_on_quality_errors }}" \
            --quiet

      - name: Execute and wait
        id: execute
        run: |
          set -euo pipefail
          EXECUTION_NAME="$(gcloud run jobs execute "${CLOUD_RUN_JOB}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --wait \
            --format='value(metadata.name)')"

          if [ -z "${EXECUTION_NAME}" ]; then
            echo "Cloud Run execution name was not returned." >&2
            exit 1
          fi

          echo "execution_name=${EXECUTION_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Show execution result
        if: always() && steps.execute.outputs.execution_name != ''
        run: |
          set -euo pipefail
          EXECUTION_NAME="${{ steps.execute.outputs.execution_name }}"
          gcloud run jobs executions describe "${EXECUTION_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --format="yaml(metadata.name,metadata.creationTimestamp,status.startTime,status.completionTime,status.succeededCount,status.failedCount,status.cancelledCount,status.conditions)"

      - name: Write job summary
        if: always()
        run: |
          EXECUTION_NAME="${{ steps.execute.outputs.execution_name }}"
          LOG_URL="https://console.cloud.google.com/run/jobs/executions/details/${CLOUD_RUN_REGION}/${EXECUTION_NAME}/tasks?project=${GCP_PROJECT_ID}"

          {
            echo "## Cloud Run Job execution"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Project | \`${GCP_PROJECT_ID}\` |"
            echo "| Region | \`${CLOUD_RUN_REGION}\` |"
            echo "| Job | \`${CLOUD_RUN_JOB}\` |"
            echo "| Target month | \`${{ inputs.target_month }}\` |"
            echo "| Fail on quality errors | \`${{ inputs.fail_on_quality_errors }}\` |"
            if [ -n "${EXECUTION_NAME}" ]; then
              echo "| Execution | \`${EXECUTION_NAME}\` |"
              echo ""
              echo "[Open execution logs in Google Cloud Console](${LOG_URL})"
            else
              echo "| Execution | Not started |"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
